syntax = "proto3";
package ss;

import "ss_base.proto";
import "ss_err_code.proto";

message HeartBeat
{
    message Request
    {
        string server_name  = 1;
        int64  send_time    = 2;
    }

    message Response
    {
        SSErrorCode err         = 1;
        int64       send_time   = 2;
        ServiceInfo service_info  = 3;
    }
    
    Request     request     = 1;
    Response    response    = 2;
}

// SS_REGIST_TO_CENTER = 1;
message RegistToCenter
{
    message Request
    {
        ServiceInfo local_info = 1;
        int64       send_time  = 2;
    }

    message Response
    {
        SSErrorCode err             = 1;
        string local_busd_shm_name  = 2;
    }
    
    Request     request     = 1;
    Response    response    = 2;
}

// SS_UPDATE_SERVICE_STATUS = 2;
message UpdateServiceStatus
{
    message Request
    {
        ServiceInfo local_info = 1;
        int64       send_time  = 2;
    }

    message Response
    {
        SSErrorCode          err              = 1;
        repeated ServiceInfo service_info_map = 2;
    }
    
    Request     request     = 1;
    Response    response    = 2;
}

// SS_TRACE_ROUTE = 3;
message TraceRoute
{
    message Request
    {
        int64       send_time    = 1;
        ServiceInfo service_info = 2;
    }

    message Response
    {
        SSErrorCode err          = 1;
        int64       send_time    = 2;
        ServiceInfo service_info = 3;
    }

    bool        is_req      = 1;
    Request     request     = 2;
    Response    response    = 3;
}