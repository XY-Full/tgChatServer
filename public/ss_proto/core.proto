syntax = "proto3";
package ss;

import "ss_base.proto";
import "ss_err_code.proto";

message HeartBeat
{
    message Request
    {
        string server_name_  = 1;
        int64  send_time_    = 2;
    }

    message Response
    {
        SSErrorCode err         = 1;
        int64       send_time_   = 2;
        ServiceInfo service_info_  = 3;
    }
    
    Request     request     = 1;
    Response    response    = 2;
}

// SS_REGIST_TO_CENTER = 1;
message RegistToCenter
{
    message Request
    {
        ServiceInfo local_info_ = 1;
        int64       send_time_  = 2;
    }

    message Response
    {
        SSErrorCode err             = 1;
        string local_busd_shm_name_  = 2;
    }
    
    Request     request     = 1;
    Response    response    = 2;
}

// SS_UPDATE_SERVICE_STATUS = 2;
message UpdateServiceStatus
{
    message Request
    {
        ServiceInfo local_info_ = 1;
        int64       send_time_  = 2;
    }

    message Response
    {
        SSErrorCode          err              = 1;
        repeated ServiceInfo service_info_map_ = 2;
    }
    
    Request     request     = 1;
    Response    response    = 2;
}

// SS_TRACE_ROUTE_REQ = 3;
message TraceRouteReq
{
    int64       send_time_    = 1;
    ServiceInfo service_info_ = 2;
}

// SS_TRACE_ROUTE_RSP = 4;
message TraceRouteRsp
{
    SSErrorCode err           = 1;
    int64       send_time_    = 2;
    ServiceInfo service_info_ = 3;
}