syntax = "proto3";
package ss;

import "ss_base.proto";
import "ss_err_code.proto";

message HeartBeat
{

}

// SS_REGIST_TO_CENTER = 1;
message RegistToCenter
{
    message Request
    {
        ServiceInfo local_info = 1;
    }

    message Response
    {
        SSErrorCode err = 1;
    }
    
    Request     request     = 1;
    Response    response    = 2;
}

// SS_UPDATE_SERVICE_STATUS = 2;
message UpdateServiceStatus
{
    message Request
    {
        ServiceInfo local_info = 1;
    }

    message Response
    {
        repeated ServiceInfo service_info_map = 1;
    }
    
    Request     request     = 1;
    Response    response    = 2;
}